<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Chiltern Computers</title>
  <meta name="theme-color" content="#1a202c" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Exo+2:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      color: #f8fafc;
      font-family: 'Exo 2', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9));
      border: 2px solid rgba(6,182,212,0.3);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #06b6d4;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px rgba(6,182,212,0.5);
    }
    p { color: #e5e7eb; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1rem; }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(45deg, #10b981, #06b6d4);
      color: #fff;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      transition: transform 0.2s ease;
    }
    .phone-link:hover { transform: translateY(-2px); }
    .retry {
      display: block;
      margin-top: 1.5rem;
      color: #06b6d4;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .retry:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container" role="main">
    <span class="icon" aria-hidden="true">&#128752;</span>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. You can still reach us by phone — we're happy to help.</p>
    <a href="tel:+447971331814" class="phone-link">
      <span aria-hidden="true">&#128222;</span>
      07971 331814
    </a>
    <a href="/" class="retry">Try again</a>
  </div>
</body>
</html>
